<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>量子口语觉醒</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Phosphor Icons (轻量级图标库，替代 Lucide) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* 极客风样式设定 */
    body { background-color: #050810; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; overscroll-behavior: none; }
    .bg-grid { background-image: linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px); background-size: 2rem 2rem; opacity: 0.1; }
    .perspective-1000 { perspective: 1000px; }
    
    /* 隐藏滚动条 */
    ::-webkit-scrollbar { display: none; }
    
    /* 卡片动画过渡 */
    .card-transition { transition: transform 0.3s ease-out, opacity 0.3s ease-out, box-shadow 0.3s; }
    .swipe-left { transform: translateX(-120%) rotate(-15deg); opacity: 0; }
    .swipe-right { transform: translateX(120%) rotate(15deg); opacity: 0; }
    
    /* 底部安全区 (适配刘海屏) */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    
    /* 麦克风脉冲动画 */
    @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    .animate-pulse-red { animation: pulse-red 1.5s infinite; background-color: rgba(239,68,68,0.2); border-color: #ef4444; color: #ef4444; transform: scale(1.1); }
  </style>
</head>
<body class="relative flex flex-col w-full h-screen selection:bg-cyan-500/30">

  <!-- 背景网格 -->
  <div class="absolute inset-0 bg-grid pointer-events-none z-0"></div>

  <!-- 全局通知组件 -->
  <div id="notification-toast" class="absolute top-20 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm bg-cyan-900/95 backdrop-blur-md border border-cyan-500/50 text-white text-sm px-4 py-3 rounded-lg shadow-[0_0_30px_rgba(6,182,212,0.4)] z-50 flex items-center justify-center gap-2 transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none">
    <i class="ph ph-sparkle text-cyan-300 text-lg"></i>
    <span id="toast-msg" class="font-mono font-bold tracking-wider">通知内容</span>
  </div>

  <!-- 顶部秒表栏 -->
  <div class="h-[60px] shrink-0 w-full border-b border-slate-800 bg-[#0a0f1c]/90 backdrop-blur-md flex items-center justify-between px-4 z-20 shadow-md">
    <div class="flex items-center gap-2 text-cyan-400">
      <i id="clock-icon" class="ph ph-clock text-lg"></i>
      <span id="timer-display" class="font-mono font-bold text-xl tracking-widest text-slate-500">00:00</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-toggle-timer" class="flex items-center gap-1.5 px-4 py-1.5 rounded border text-[11px] font-mono tracking-widest uppercase transition-all shadow-sm active:scale-95 bg-green-500/10 border-green-500/50 text-green-400">
        <i id="timer-state-icon" class="ph ph-play text-sm"></i> <span id="timer-state-text">START</span>
      </button>
      <button id="btn-reset-timer" class="p-1.5 rounded border border-slate-700 bg-slate-800 text-slate-400 hover:text-red-400 transition-colors active:scale-95">
        <i class="ph ph-arrow-counter-clockwise text-sm"></i>
      </button>
    </div>
  </div>

  <!-- 核心内容区 (动态切换容器) -->
  <div id="main-content" class="flex-1 overflow-y-auto relative z-10">
    <!-- 各个视图将由 JS 动态注入到这里 -->
  </div>

  <!-- 底部导航栏 -->
  <div class="h-[70px] shrink-0 w-full bg-[#0a0f1c]/95 backdrop-blur-xl border-t border-slate-800 flex items-center justify-between px-1 z-30 pb-safe">
    <button onclick="switchTab('stage1')" id="nav-stage1" class="nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-cyan-400">
      <i class="ph-fill ph-lightning text-xl mb-1"></i>
      <span class="text-[9px] font-bold tracking-widest">一阶生存</span>
    </button>
    <button onclick="switchTab('stage2')" id="nav-stage2" class="nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-slate-600">
      <i class="ph-fill ph-radio text-xl mb-1"></i>
      <span class="text-[9px] font-bold tracking-widest">二阶雷达</span>
    </button>
    <button onclick="switchTab('stage3')" id="nav-stage3" class="nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-slate-600">
      <i class="ph-fill ph-shield-check text-xl mb-1"></i>
      <span class="text-[9px] font-bold tracking-widest">三阶日记</span>
    </button>
    <button onclick="switchTab('dev')" id="nav-dev" class="nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-slate-600">
      <i class="ph-fill ph-code text-xl mb-1"></i>
      <span class="text-[9px] font-bold tracking-widest">代码特区</span>
    </button>
  </div>

<script>
// ================= 原生 JS 引擎逻辑 =================

// 1. 模拟底层“破冰包”数据库 (内置 80 句高频)
// 实际应用中，这里将被 fetch('database.json') 替代
const DB = {

    group1: [
      { id: 1, en: 'I want this.', zh: '我想要这个。', sound: '爱 万特 迪斯', words: [{w:'I', m:'我'}, {w:'want', m:'想要'}, {w:'this', m:'这个'}] },
      { id: 2, en: 'How much is it?', zh: '这多少钱？', sound: '好 吗起 意思 伊特？', words: [{w:'How', m:'多少'}, {w:'much', m:'大量'}, {w:'is', m:'是'}, {w:'it', m:'它'}] },

      { id: 4, en: 'Can you help me?', zh: '你能帮我吗？', sound: '坎 尤 嗨尔普 密？', words: [{w:'Can', m:'能'}, {w:'you', m:'你'}, {w:'help', m:'帮助'}, {w:'me', m:'我'}] },
      { id: 5, en: 'Where is the toilet?', zh: '厕所在哪里？', sound: '喂儿 意思 惹 托伊勒特？', words: [{w:'Where', m:'哪里'}, {w:'is', m:'是'}, {w:'the', m:'特指'}, {w:'toilet', m:'厕所'}] },

      { id: 7, en: 'Speak slowly, please.', zh: '请说慢点。', sound: '斯皮克 斯楼里 普利兹', words: [{w:'Speak', m:'说'}, {w:'slowly', m:'慢地'}, {w:'please', m:'请'}] },
      { id: 8, en: 'I am sorry.', zh: '我很抱歉。', sound: '爱 艾姆 搜瑞', words: [{w:'I', m:'我'}, {w:'am', m:'是'}, {w:'sorry', m:'抱歉的'}] },
      { id: 9, en: 'Thank you very much.', zh: '非常感谢。', sound: '三克 尤 威瑞 吗起', words: [{w:'Thank', m:'感谢'}, {w:'you', m:'你'}, {w:'very', m:'非常'}, {w:'much', m:'多'}] },
      { id: 10, en: 'What time is it?', zh: '几点了？', sound: '沃特 泰姆 意思 伊特？', words: [{w:'What', m:'什么'}, {w:'time', m:'时间'}, {w:'is', m:'是'}, {w:'it', m:'它'}] }
    ],
    group2: [
      { id: 11, en: 'Nice to meet you.', zh: '很高兴见到你。', sound: '耐斯 图 密特 尤', words: [{w:'Nice', m:'好的'}, {w:'to', m:'去'}, {w:'meet', m:'遇见'}, {w:'you', m:'你'}] },
      { id: 12, en: 'How are you doing?', zh: '你过得怎么样？', sound: '好 阿 尤 都影？', words: [{w:'How', m:'如何'}, {w:'are', m:'是'}, {w:'you', m:'你'}, {w:'doing', m:'做'}] },
      { id: 13, en: 'I think so.', zh: '我认为是这样。', sound: '爱 씽克 搜', words: [{w:'I', m:'我'}, {w:'think', m:'认为'}, {w:'so', m:'如此'}] },
      { id: 14, en: 'Are you sure?', zh: '你确定吗？', sound: '阿 尤 硕尔？', words: [{w:'Are', m:'是'}, {w:'you', m:'你'}, {w:'sure', m:'确定的'}] },
      { id: 15, en: 'Of course.', zh: '当然。', sound: '欧夫 靠斯', words: [{w:'Of', m:'的'}, {w:'course', m:'过程'}] }
    ],
    group3: [
      { id: 16, en: 'Where is the train station?', zh: '火车站怎么走？', sound: '喂儿 意思 惹 吹恩 斯得神？', words: [{w:'Where', m:'哪里'}, {w:'train', m:'火车'}, {w:'station', m:'车站'}] },
      { id: 17, en: 'One ticket, please.', zh: '请给我一张票。', sound: '万 踢克特 普利兹', words: [{w:'One', m:'一'}, {w:'ticket', m:'票'}] },
      { id: 18, en: 'Keep going straight.', zh: '一直往前走。', sound: '基普 够影 斯锤特', words: [{w:'Keep', m:'保持'}, {w:'straight', m:'直着'}] },
      { id: 19, en: 'Turn left here.', zh: '在这里左转。', sound: '特恩 莱夫特 嘿儿', words: [{w:'Turn', m:'转弯'}, {w:'left', m:'左'}] },
      { id: 20, en: 'Can I pay by card?', zh: '可以刷卡吗？', sound: '坎 爱 佩 白 卡的？', words: [{w:'pay', m:'支付'}, {w:'card', m:'卡'}] }
    ]
  },
  dev: {
    group1: [
      { id: 101, en: 'Failed to fetch data.', zh: '获取数据失败。', sound: '费欧德 图 费吃 得他', words: [{w:'Failed', m:'失败'}, {w:'fetch', m:'获取'}, {w:'data', m:'数据'}] },
      { id: 102, en: 'Invalid syntax error.', zh: '无效语法错误。', sound: '因瓦利德 辛泰克斯 艾若', words: [{w:'Invalid', m:'无效的'}, {w:'syntax', m:'语法'}, {w:'error', m:'错误'}] },
      { id: 103, en: 'Out of memory.', zh: '内存溢出。', sound: '奥特 欧夫 迈莫瑞', words: [{w:'Out', m:'出'}, {w:'memory', m:'内存'}] },
      { id: 104, en: 'Merge conflict found.', zh: '发现合并冲突。', sound: '默吉 康弗利克特 方德', words: [{w:'Merge', m:'合并'}, {w:'conflict', m:'冲突'}] },
      { id: 105, en: 'Cannot read property.', zh: '无法读取属性。', sound: '坎闹特 瑞的 普绕破提', words: [{w:'Cannot', m:'不能'}, {w:'read', m:'读取'}, {w:'property', m:'属性'}] }
    ]
  }
};

const CONTEXT_TEMPLATES = [
  { template: "Customer: [TARGET_1]. Can I pay by card? \nCashier: Of course.", zh: "顾客：[目标词块1]。我可以刷卡吗？\n收银员：当然。" },
  { template: "Attention, the elevator is currently [TARGET_2]. Use stairs.", zh: "注意，电梯目前[目标词块2]。请走楼梯。" },
  { template: "I was walking and suddenly realized [TARGET_3]. A kind person helped me.", zh: "我在散步，突然意识到[目标词块3]。一个好心人帮助了我。" },
  { template: "Receptionist: Good evening! Do you have a reservation? \nGuest: [TARGET_4].", zh: "前台：晚上好！您有预定吗？\n客人：[目标词块4]。" },
  { template: "It's an emergency! Please [TARGET_5] immediately. There has been an accident.", zh: "紧急情况！请立刻[目标词块5]。发生了一起事故。" }
];


// 2. 全局应用状态
const AppState = {
  currentTab: 'stage1',
  activeDeck: [],
  totalCards: 0,
  learnedCards: 0,
  deckTitle: '',
  todayWords: [], // 用于二阶强绑定
  diaries: [], // 三阶存储
  
  // 计时器
  timeElapsed: 0,
  timerInterval: null,
  isTimerRunning: false,
  
  // 语音合成
  synth: window.speechSynthesis,
  isSpeaking: false,
  
  // 语音识别
  recognition: null,
  isListening: false
};

// 初始化语音识别引擎 (仅当支持时)
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  AppState.recognition = new SpeechRecognition();
  AppState.recognition.lang = 'en-US';
  AppState.recognition.interimResults = false;
  AppState.recognition.maxAlternatives = 1;
}

// 3. 核心工具函数

// 提示吐司
function showToast(msg) {
  const toast = document.getElementById('notification-toast');
  document.getElementById('toast-msg').innerText = msg;
  toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
  toast.classList.add('opacity-100', 'translate-y-0');
  setTimeout(() => {
    toast.classList.remove('opacity-100', 'translate-y-0');
    toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
  }, 2500);
}

// 计时器控制
document.getElementById('btn-toggle-timer').addEventListener('click', () => {
  const btnText = document.getElementById('timer-state-text');
  const btnIcon = document.getElementById('timer-state-icon');
  const clockIcon = document.getElementById('clock-icon');
  const timeDisplay = document.getElementById('timer-display');
  const btnToggle = document.getElementById('btn-toggle-timer');

  if (AppState.isTimerRunning) {
    // 暂停
    clearInterval(AppState.timerInterval);
    AppState.isTimerRunning = false;
    btnText.innerText = 'START';
    btnIcon.className = 'ph ph-play text-sm';
    clockIcon.classList.remove('animate-pulse');
    timeDisplay.classList.remove('text-cyan-400');
    timeDisplay.classList.add('text-slate-500');
    
    btnToggle.className = 'flex items-center gap-1.5 px-4 py-1.5 rounded border text-[11px] font-mono tracking-widest uppercase transition-all shadow-sm active:scale-95 bg-green-500/10 border-green-500/50 text-green-400';
  } else {
    // 开始
    AppState.timerInterval = setInterval(() => {
      AppState.timeElapsed++;
      timeDisplay.innerText = formatTime(AppState.timeElapsed);
    }, 1000);
    AppState.isTimerRunning = true;
    btnText.innerText = 'PAUSE';
    btnIcon.className = 'ph ph-pause text-sm';
    clockIcon.classList.add('animate-pulse');
    timeDisplay.classList.remove('text-slate-500');
    timeDisplay.classList.add('text-cyan-400');
    
    btnToggle.className = 'flex items-center gap-1.5 px-4 py-1.5 rounded border text-[11px] font-mono tracking-widest uppercase transition-all shadow-sm active:scale-95 bg-orange-500/10 border-orange-500/50 text-orange-400';
  }
});

document.getElementById('btn-reset-timer').addEventListener('click', () => {
  clearInterval(AppState.timerInterval);
  AppState.isTimerRunning = false;
  AppState.timeElapsed = 0;
  document.getElementById('timer-display').innerText = '00:00';
  document.getElementById('timer-state-text').innerText = 'START';
  document.getElementById('timer-state-icon').className = 'ph ph-play text-sm';
  document.getElementById('clock-icon').classList.remove('animate-pulse');
  document.getElementById('timer-display').classList.remove('text-cyan-400');
  document.getElementById('timer-display').classList.add('text-slate-500');
  document.getElementById('btn-toggle-timer').className = 'flex items-center gap-1.5 px-4 py-1.5 rounded border text-[11px] font-mono tracking-widest uppercase transition-all shadow-sm active:scale-95 bg-green-500/10 border-green-500/50 text-green-400';
  showToast('⏱️ 计时器归零。');
});

function formatTime(secs) {
  const m = Math.floor(secs / 60).toString().padStart(2, '0');
  const s = (secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// 语音播放引擎 (强制中断麦克风)
window.playAudio = function(text, event) {
  if (event) { event.stopPropagation(); event.preventDefault(); }
  if (!AppState.synth) { showToast("⚠️ 浏览器不支持语音"); return; }
  
  // 中断麦克风
  if (AppState.isListening && AppState.recognition) {
    AppState.recognition.stop();
    AppState.isListening = false;
    updateMicUI(false);
  }
  
  // 停止之前播放的声音
  AppState.synth.cancel();
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.65; // 慢速
  
  // 喇叭动画控制 (如果有对应的图标)
  const volIcon = event ? event.currentTarget.querySelector('.ph-speaker-high') : null;
  if(volIcon) volIcon.classList.add('animate-pulse', 'text-cyan-400');
  
  utterance.onend = () => { if(volIcon) volIcon.classList.remove('animate-pulse', 'text-cyan-400'); };
  utterance.onerror = () => { if(volIcon) volIcon.classList.remove('animate-pulse', 'text-cyan-400'); };
  
  AppState.synth.speak(utterance);
};


// 麦克风跟读引擎
window.startRecognition = function(targetText, event) {
  if (event) { event.stopPropagation(); event.preventDefault(); }
  
  if (!AppState.recognition) {
    showToast("⚠️ 当前环境不支持麦克风评测 (建议使用 Safari/Chrome)");
    return;
  }

  // 掐断播放的声音
  AppState.synth.cancel();
  
  updateMicUI(true);
  
  try {
    AppState.recognition.start();
  } catch(e) {
    updateMicUI(false);
    showToast("⚠️ 启动失败，请重试");
  }

  AppState.recognition.onresult = (e) => {
    updateMicUI(false);
    const transcript = e.results[0][0].transcript.toLowerCase();
    const target = targetText.toLowerCase().replace(/[^a-z\s]/g, "");
    const spoken = transcript.replace(/[^a-z\s]/g, "");
    
    // 粗略匹配
    if (target.includes(spoken) || spoken.includes(target)) {
      showToast('🌟 完美发音！进入下一张');
      handleSwipe('right');
    } else {
      showToast(`❌ 听到: "${transcript}"。请点单词重听`);
      document.getElementById('card-container').classList.add('border-red-500', 'shadow-[0_0_30px_rgba(239,68,68,0.3)]');
    }
  };

  AppState.recognition.onerror = (e) => {
    updateMicUI(false);
    if(e.error === 'not-allowed') showToast("⚠️ 请授予麦克风权限");
    else if (e.error !== 'no-speech') showToast("⚠️ 未识别到声音");
  };
};

function updateMicUI(isListening) {
  AppState.isListening = isListening;
  const micBtn = document.getElementById('mic-btn');
  const micText = document.getElementById('mic-text');
  if (!micBtn) return;
  
  if (isListening) {
    micBtn.className = 'w-14 h-14 rounded-full flex items-center justify-center transition-all animate-pulse-red';
    micText.innerText = 'LISTENING...';
    micText.classList.replace('text-slate-500', 'text-red-400');
  } else {
    micBtn.className = 'w-14 h-14 rounded-full flex items-center justify-center transition-all bg-slate-800 border border-slate-600 hover:border-cyan-500 text-slate-400 shadow-lg';
    micText.innerText = 'SWIPE OR SPEAK';
    micText.classList.replace('text-red-400', 'text-slate-500');
  }
}


// 4. 业务逻辑与渲染

// 根据日期生成计划
function loadDailyPlan(tab) {
  const day = new Date().getDay();
  let db = tab === 'dev' ? DB.dev : DB.survival;
  let pool = [];
  
  if(day === 1 || day === 2) { pool = db.group1; AppState.deckTitle = tab==='dev'?'代码一阶':'生存一阶'; }
  else if(day === 3 || day === 4) { pool = db.group2 || db.group1; AppState.deckTitle = tab==='dev'?'代码二阶':'生存二阶'; }
  else if(day === 5 || day === 6) { pool = db.group3 || db.group1; AppState.deckTitle = tab==='dev'?'代码三阶':'生存三阶'; }
  else { 
    pool = [...(db.group1||[]), ...(db.group2||[]), ...(db.group3||[])]; 
    AppState.deckTitle = '周末总测验'; 
  }
  
  // 随机打乱并加载
  AppState.activeDeck = [...pool].sort(() => Math.random() - 0.5);
  AppState.totalCards = AppState.activeDeck.length;
  AppState.learnedCards = 0;
  
  if (tab === 'stage1') AppState.todayWords = pool; // 留给二阶用
}

// 导航切换
window.switchTab = function(tabName) {
  AppState.currentTab = tabName;
  
  // UI 样式切换
  ['stage1', 'stage2', 'stage3', 'dev'].forEach(id => {
    const el = document.getElementById('nav-'+id);
    if(id === tabName) {
      let colorClass = id==='stage1'?'text-cyan-400':(id==='stage2'?'text-purple-400':(id==='stage3'?'text-emerald-400':'text-green-400'));
      el.className = `nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all ${colorClass}`;
      el.querySelector('i').classList.add('animate-pulse');
    } else {
      el.className = `nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-slate-600`;
      el.querySelector('i').classList.remove('animate-pulse');
    }
  });

  // 渲染对应视图
  if(tabName === 'stage1' || tabName === 'dev') {
    loadDailyPlan(tabName);
    renderSwipeView();
  } else if (tabName === 'stage2') {
    renderStage2View();
  } else if (tabName === 'stage3') {
    renderStage3View();
  }
};

// ================= 视图渲染器 =================

function renderSwipeView() {
  const container = document.getElementById('main-content');
  if (AppState.activeDeck.length === 0) {
    container.innerHTML = `
      <div class="flex flex-col items-center justify-center w-full h-full px-6 text-center animate-in fade-in zoom-in duration-300">
        <div class="w-24 h-24 rounded-full bg-green-500/20 border-2 border-green-500 flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(34,197,94,0.3)]">
          <i class="ph ph-check-circle text-5xl text-green-400"></i>
        </div>
        <h2 class="text-2xl font-black text-white mb-2 tracking-widest">神经回路建立完毕</h2>
        <p class="text-slate-400 text-sm font-mono mb-8">掌握: ${AppState.totalCards} / ${AppState.totalCards}</p>
        <div class="text-xs text-slate-500 bg-slate-800 p-4 rounded-lg border border-slate-700">请前往下一步进行实战测试。</div>
      </div>
    `;
    return;
  }

  const card = AppState.activeDeck[0];
  const percent = (AppState.learnedCards / AppState.totalCards) * 100;
  
  // 生成单词拆解 HTML
  const wordsHtml = card.words.map(w => `
    <button onclick="playAudio('${w.w}', event)" class="flex flex-col items-center bg-[#0a0f1c] hover:bg-slate-800 px-2 py-1.5 rounded-lg shadow-sm border border-slate-700/80 transition-all active:scale-95">
      <span class="text-[13px] font-bold text-purple-300 font-mono">${w.w}</span>
      <span class="text-[10px] text-slate-500 mt-0.5">${w.m}</span>
    </button>
  `).join('');

  container.innerHTML = `
    <div class="flex flex-col items-center w-full h-full px-4 pt-4 pb-4 relative overflow-hidden">
      
      <!-- 进度条 -->
      <div class="w-full mb-3 text-center">
        <h2 class="text-sm font-black text-cyan-400 bg-slate-900/80 inline-block px-4 py-1.5 rounded-full border border-cyan-500/30">${AppState.deckTitle}</h2>
        <div class="w-full max-w-[240px] h-1.5 bg-slate-800 rounded-full mx-auto mt-4 overflow-hidden">
          <div class="h-full bg-cyan-500 transition-all duration-300" style="width: ${percent}%"></div>
        </div>
        <p class="text-[10px] text-slate-500 font-mono mt-2 tracking-widest">已掌握: ${AppState.learnedCards} | 剩余: ${AppState.activeDeck.length}</p>
      </div>

      <!-- 核心卡片容器 -->
      <div class="relative w-full max-w-sm flex-1 flex items-center justify-center perspective-1000 mt-2">
        ${AppState.activeDeck.length > 1 ? '<div class="absolute w-full h-[85%] bg-slate-800/80 rounded-3xl border border-slate-700/50 transform scale-95 translate-y-4 z-0"></div>' : ''}
        
        <div id="card-container" class="absolute w-full h-[95%] max-h-[520px] bg-[#0f172a] rounded-3xl border-2 border-slate-700 shadow-2xl flex flex-col items-center justify-between p-5 z-10 card-transition" onclick="playAudio('${card.en.replace(/'/g, "\\'")}', event)">
          
          <div class="w-full flex justify-between items-center text-slate-500 mb-1">
            <span class="text-[10px] font-mono tracking-widest bg-slate-800 px-2 py-1 rounded border border-slate-700">ID: #${card.id}</span>
            <button class="p-2 rounded-full bg-slate-800"><i class="ph ph-speaker-high text-xl"></i></button>
          </div>

          <div class="flex-1 flex flex-col items-center justify-center w-full text-center space-y-4 py-2">
            <h2 class="text-3xl sm:text-4xl font-black text-white tracking-tight leading-tight drop-shadow-md px-2">${card.en}</h2>
            <div class="bg-slate-900/80 px-4 py-2 rounded-xl border border-cyan-500/20 w-[90%]">
              <p class="text-[10px] text-cyan-600 font-mono uppercase tracking-widest mb-1">发音密码</p>
              <p class="text-lg font-bold text-cyan-400 tracking-widest">${card.sound}</p>
            </div>
            
            <!-- 单词拆解 -->
            <div class="w-[95%] bg-slate-800/40 rounded-xl p-2.5 border border-slate-700/50 flex flex-wrap justify-center gap-2" onclick="event.stopPropagation()">
              ${wordsHtml}
            </div>

            <div class="w-full pt-1">
              <p class="text-[10px] text-slate-500 mb-1 tracking-widest uppercase">意境</p>
              <p class="text-xl font-bold text-slate-200">${card.zh}</p>
            </div>
          </div>

          <!-- 麦克风 -->
          <div class="w-full mt-2 flex flex-col items-center">
            <button id="mic-btn" onclick="startRecognition('${card.en.replace(/'/g, "\\'")}', event)" class="w-14 h-14 rounded-full flex items-center justify-center transition-all bg-slate-800 border border-slate-600 shadow-lg text-slate-400">
              <i class="ph-fill ph-microphone text-2xl"></i>
            </button>
            <p id="mic-text" class="text-[9px] font-mono mt-2 tracking-widest text-slate-500">SWIPE OR SPEAK</p>
          </div>
        </div>
      </div>

      <!-- 底部判卷器 -->
      <div class="w-full max-w-sm flex justify-between items-center mt-4 z-20">
        <button onclick="window.handleSwipe('left')" class="w-14 h-14 rounded-full bg-slate-900 border-2 border-red-500/50 flex flex-col items-center justify-center text-red-400 active:scale-90 transition-transform">
          <i class="ph ph-arrow-left text-xl mb-0.5"></i>
          <span class="text-[8px] font-bold">记不住</span>
        </button>
        <div class="flex flex-col items-center text-slate-600 font-mono text-[9px] uppercase tracking-widest opacity-50">
          <i class="ph ph-arrows-clockwise text-sm mb-1"></i> Repeat
        </div>
        <button onclick="window.handleSwipe('right')" class="w-14 h-14 rounded-full bg-slate-900 border-2 border-green-500/50 flex flex-col items-center justify-center text-green-400 active:scale-90 transition-transform">
          <i class="ph ph-arrow-right text-xl mb-0.5"></i>
          <span class="text-[8px] font-bold">已掌握</span>
        </button>
      </div>
    </div>
  `;
}

window.handleSwipe = function(direction) {
  if (AppState.activeDeck.length === 0) return;
  const cardEl = document.getElementById('card-container');
  if(!cardEl) return;

  // 添加飞出动画
  cardEl.classList.add(direction === 'left' ? 'swipe-left' : 'swipe-right');

  const currentCard = AppState.activeDeck[0];

  setTimeout(() => {
    AppState.activeDeck.shift();

    if (direction === 'left') {
      const insertIndex = Math.max(1, Math.floor(AppState.activeDeck.length / 2));
      AppState.activeDeck.splice(insertIndex, 0, currentCard);
    } else {
      AppState.learnedCards++;
    }
    renderSwipeView();
  }, 300);
};

function renderStage2View() {
  const container = document.getElementById('main-content');
  if(AppState.todayWords.length === 0) {
    container.innerHTML = `<div class="p-10 text-center text-slate-500 text-sm mt-20">请先在「一阶生存」获取今日核心词汇。</div>`;
    return;
  }

  let logsHtml = '';
  CONTEXT_TEMPLATES.forEach((tmpl, i) => {
    const word = AppState.todayWords[i % AppState.todayWords.length];
    if(!word) return;
    const en = tmpl.template.replace(/\[TARGET_\d+\]/, word.en.replace('.',''));
    const zh = tmpl.zh.replace(/\[目标词块\d+\]/, word.zh.replace('。',''));
    const color = i%2===0?'bg-red-500':'bg-yellow-500';
    
    logsHtml += `
      <div class="w-full rounded-xl border font-mono text-sm bg-[#0f172a] border-slate-800 mb-3 overflow-hidden">
        <div class="p-4 flex gap-3 items-start border-b border-slate-800/50">
          <span class="mt-1.5 shrink-0 w-2 h-2 rounded-full ${color}"></span>
          <p class="text-slate-300 leading-relaxed whitespace-pre-wrap">${en}</p>
        </div>
        <div class="px-4 pb-4 pt-3 bg-slate-900/50">
          <p class="text-slate-300 text-[13px] leading-relaxed mb-3 font-sans whitespace-pre-wrap">${zh}</p>
          <div class="text-[10px] text-purple-400/80 mb-3 border-l-2 border-purple-500 pl-2">考点关联：${word.en}</div>
          <button onclick="playAudio('${en.replace(/'/g, "\\'")}', event)" class="w-full text-xs flex items-center justify-center gap-2 text-purple-400 bg-purple-500/10 py-2.5 rounded-lg border border-purple-500/30">
            <i class="ph-fill ph-speaker-high"></i> 原音慢速重放
          </button>
        </div>
      </div>
    `;
  });

  container.innerHTML = `
    <div class="w-full max-w-md mx-auto px-4 py-6">
      <div class="mb-4 border-b border-slate-800 pb-2">
        <h2 class="text-xl font-black text-purple-400 flex items-center gap-2"><i class="ph-fill ph-radio"></i> 二阶强绑定语境</h2>
        <p class="text-[10px] text-slate-500 font-mono mt-1">Daily Linked Input</p>
      </div>
      <p class="text-[11px] text-slate-400 mb-4 bg-slate-800/40 p-3 rounded-lg border border-slate-700/50">
        下面包含你今天刚学的词块。请尝试翻译整段话。
      </p>
      ${logsHtml}
    </div>
  `;
}

function renderStage3View() {
  const container = document.getElementById('main-content');
  
  let listHtml = AppState.diaries.length === 0 
    ? '<div class="text-center py-8 text-slate-600"><i class="ph ph-terminal text-3xl mb-2 opacity-20"></i><p class="text-[10px] font-mono">今日还未输出频率</p></div>'
    : AppState.diaries.map(d => `
        <div class="bg-slate-800/40 border border-slate-700/50 rounded-lg p-4 mb-3">
          <p class="text-sm text-slate-200 font-mono mb-3 leading-relaxed">${d.text}</p>
          <div class="flex items-center justify-between text-[10px] text-slate-500 font-mono">
            <span>${d.time}</span><span class="text-emerald-400/80"><i class="ph-fill ph-check-circle"></i> Shifted</span>
          </div>
        </div>
      `).join('');

  container.innerHTML = `
    <div class="w-full max-w-md mx-auto px-4 py-6">
      <div class="mb-4 border-b border-slate-800 pb-2">
        <h2 class="text-xl font-black text-emerald-400 flex items-center gap-2"><i class="ph-fill ph-shield-check"></i> 三阶显化日记</h2>
      </div>
      <div class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-4 mb-6 shadow-lg">
        <textarea id="diary-input" placeholder="用今天学的词块造句..." class="w-full h-20 bg-transparent text-slate-200 placeholder-slate-600 focus:outline-none resize-none font-mono text-sm"></textarea>
        <div class="flex justify-end mt-2 pt-2 border-t border-slate-800">
          <button onclick="window.sendDiary()" class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-bold bg-emerald-600 text-white active:scale-95">
            <i class="ph-fill ph-paper-plane-right"></i> 发射显化
          </button>
        </div>
      </div>
      <div>
        <h3 class="text-[10px] text-slate-500 font-mono tracking-widest uppercase border-b border-slate-800 pb-2 mb-3">现实锚点</h3>
        ${listHtml}
      </div>
    </div>
  `;
}

window.sendDiary = function() {
  const input = document.getElementById('diary-input').value;
  if(!input.trim()) return;
  const now = new Date();
  AppState.diaries.unshift({
    id: Date.now(),
    text: input,
    time: `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`
  });
  showToast('🌌 你的宇宙能量已锚定！');
  renderStage3View();
};


// 5. 初始化入口
window.onload = () => {
  // 预热语音引擎
  if(window.speechSynthesis) window.speechSynthesis.getVoices();
  switchTab('stage1');
};

</script>
</body>
</html>
