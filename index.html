<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- PWA 全屏沉浸式核心标签 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050810">
  <title>量子口语觉醒</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { background-color: #050810; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; overscroll-behavior: none; }
    .bg-grid { background-image: linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px); background-size: 2rem 2rem; opacity: 0.1; }
    .perspective-1000 { perspective: 1000px; }
    ::-webkit-scrollbar { display: none; }
    
    /* 滑动动画 */
    .card-transition { transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease-out, box-shadow 0.3s; }
    .swipe-left { transform: translateX(-150%) rotate(-20deg) scale(0.8); opacity: 0; }
    .swipe-right { transform: translateX(150%) rotate(20deg) scale(0.8); opacity: 0; }
    
    /* 安全区适配 (刘海屏) */
    .pt-safe { padding-top: env(safe-area-inset-top); }
    .pb-safe { padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); }
    
    /* 麦克风高亮脉冲动画 */
    @keyframes pulse-red { 
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); transform: scale(1); } 
      50% { box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); transform: scale(1.15); } 
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); transform: scale(1); } 
    }
    .mic-active { 
      animation: pulse-red 1.2s infinite; 
      background-color: #ef4444 !important; 
      border-color: #ef4444 !important; 
      color: white !important; 
    }
  </style>
</head>
<body class="relative flex flex-col w-full h-screen selection:bg-cyan-500/30">

  <div class="absolute inset-0 bg-grid pointer-events-none z-0"></div>

  <!-- 顶部全局通知 -->
  <div id="notification-toast" class="absolute top-24 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm bg-cyan-900/95 backdrop-blur-md border border-cyan-500/50 text-white text-sm px-4 py-3 rounded-xl shadow-[0_0_40px_rgba(6,182,212,0.5)] z-[100] flex items-center justify-center gap-2 transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none">
    <i class="ph ph-sparkle text-cyan-300 text-xl"></i>
    <span id="toast-msg" class="font-mono font-bold tracking-wider">通知内容</span>
  </div>

  <!-- 顶部秒表栏 (适配刘海屏) -->
  <div class="pt-safe shrink-0 w-full border-b border-slate-800 bg-[#0a0f1c]/90 backdrop-blur-md z-20 shadow-md">
    <div class="flex items-center justify-between px-4 h-[60px]">
      <div class="flex items-center gap-2 text-cyan-400">
        <i id="clock-icon" class="ph ph-clock text-xl"></i>
        <span id="timer-display" class="font-mono font-black text-2xl tracking-widest text-slate-500 drop-shadow-md">00:00</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="btn-toggle-timer" class="flex items-center gap-1.5 px-4 py-2 rounded-lg border text-xs font-mono tracking-widest uppercase transition-all shadow-sm active:scale-95 bg-green-500/10 border-green-500/50 text-green-400">
          <i id="timer-state-icon" class="ph-fill ph-play text-sm"></i> <span id="timer-state-text">START</span>
        </button>
        <button id="btn-reset-timer" class="p-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-400 hover:text-red-400 transition-colors active:scale-95">
          <i class="ph ph-arrow-counter-clockwise text-base"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- 核心内容区 -->
  <div id="main-content" class="flex-1 overflow-y-auto relative z-10 flex flex-col w-full h-full">
    <!-- 初始化加载界面 -->
    <div class="flex flex-col items-center justify-center h-full text-slate-500 w-full">
      <i class="ph ph-spinner-gap animate-spin text-5xl mb-4 text-cyan-400"></i>
      <p class="font-mono text-sm tracking-widest">CONNECTING TO DATABASE...</p>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <div class="h-[75px] shrink-0 w-full bg-[#0a0f1c]/98 backdrop-blur-xl border-t border-slate-800 flex items-center justify-between px-2 z-30 pb-safe">
    <button onclick="switchTab('stage1')" id="nav-stage1" class="nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-cyan-400 pointer-events-none opacity-50">
      <i class="ph-fill ph-lightning text-2xl mb-1"></i><span class="text-[10px] font-bold tracking-wider">一阶生存</span>
    </button>
    <button onclick="switchTab('stage2')" id="nav-stage2" class="nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-slate-600 pointer-events-none opacity-50">
      <i class="ph-fill ph-radio text-2xl mb-1"></i><span class="text-[10px] font-bold tracking-wider">二阶雷达</span>
    </button>
    <button onclick="switchTab('stage3')" id="nav-stage3" class="nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-slate-600 pointer-events-none opacity-50">
      <i class="ph-fill ph-shield-check text-2xl mb-1"></i><span class="text-[10px] font-bold tracking-wider">三阶日记</span>
    </button>
    <button onclick="switchTab('dev')" id="nav-dev" class="nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-slate-600 pointer-events-none opacity-50">
      <i class="ph-fill ph-code text-2xl mb-1"></i><span class="text-[10px] font-bold tracking-wider">代码特区</span>
    </button>
  </div>

<script>
// ================= 核心应用状态与引擎 =================
let DB = null; 

const CONTEXT_TEMPLATES = [
  { template: "Customer: [TARGET_1]. Can I pay by card? \nCashier: Of course.", zh: "顾客：[目标词块1]。我可以刷卡吗？\n收银员：当然。" },
  { template: "Attention, the elevator is currently [TARGET_2]. Use stairs.", zh: "注意，电梯目前[目标词块2]。请走楼梯。" },
  { template: "I was walking and suddenly realized [TARGET_3]. A kind person helped me.", zh: "我在散步，突然意识到[目标词块3]。一个好心人帮助了我。" },
  { template: "Receptionist: Good evening! Do you have a reservation? \nGuest: [TARGET_4].", zh: "前台：晚上好！您有预定吗？\n客人：[目标词块4]。" },
  { template: "It's an emergency! Please [TARGET_5] immediately.", zh: "紧急情况！请立刻[目标词块5]。" }
];

const AppState = {
  currentTab: 'stage1',
  activeDeck: [], totalCards: 0, learnedCards: 0, deckTitle: '',
  todayWords: [], diaries: [],
  timeElapsed: 0, timerInterval: null, isTimerRunning: false,
  synth: window.speechSynthesis, recognition: null, isListening: false
};

// 初始化麦克风
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  AppState.recognition = new SpeechRecognition();
  AppState.recognition.lang = 'en-US';
  AppState.recognition.interimResults = false;
  AppState.recognition.maxAlternatives = 1;
}

// -------------------- 数据加载 (AJAX) --------------------
window.onload = async () => {
  if (AppState.synth) {
    AppState.synth.getVoices();
    AppState.synth.onvoiceschanged = () => { AppState.synth.getVoices(); };
  }

  try {
    const res = await fetch('./database.json');
    if (!res.ok) throw new Error('Network error');
    DB = await res.json();
    
    // 解除按钮锁定
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.classList.remove('pointer-events-none', 'opacity-50');
    });
    
    switchTab('stage1');
  } catch (err) {
    document.getElementById('main-content').innerHTML = `
      <div class="flex flex-col items-center justify-center h-full px-6 text-center text-red-400 w-full">
        <i class="ph ph-warning text-6xl mb-4"></i>
        <h2 class="text-2xl font-bold mb-2">数据加载失败</h2>
        <p class="text-sm text-slate-400 mt-4 leading-relaxed">
          无法读取 <b>database.json</b>。<br><br>
          请确保两个文件上传到了同一个 GitHub 仓库。
        </p>
      </div>
    `;
  }
};


// -------------------- 交互工具 --------------------
function showToast(msg) {
  const toast = document.getElementById('notification-toast');
  document.getElementById('toast-msg').innerText = msg;
  toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
  toast.classList.add('opacity-100', 'translate-y-0');
  setTimeout(() => {
    toast.classList.remove('opacity-100', 'translate-y-0');
    toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
  }, 2500);
}

// 计时器控制
document.getElementById('btn-toggle-timer').addEventListener('click', () => {
  const btnText = document.getElementById('timer-state-text');
  const btnIcon = document.getElementById('timer-state-icon');
  const clockIcon = document.getElementById('clock-icon');
  const timeDisplay = document.getElementById('timer-display');
  const btnToggle = document.getElementById('btn-toggle-timer');

  if (AppState.isTimerRunning) {
    clearInterval(AppState.timerInterval);
    AppState.isTimerRunning = false;
    btnText.innerText = 'START';
    btnIcon.className = 'ph-fill ph-play text-sm';
    clockIcon.classList.remove('animate-pulse');
    timeDisplay.classList.remove('text-cyan-400');
    timeDisplay.classList.add('text-slate-500');
    btnToggle.className = 'flex items-center gap-1.5 px-4 py-2 rounded-lg border text-xs font-mono tracking-widest uppercase transition-all shadow-sm active:scale-95 bg-green-500/10 border-green-500/50 text-green-400';
  } else {
    AppState.timerInterval = setInterval(() => {
      AppState.timeElapsed++;
      timeDisplay.innerText = formatTime(AppState.timeElapsed);
    }, 1000);
    AppState.isTimerRunning = true;
    btnText.innerText = 'PAUSE';
    btnIcon.className = 'ph-fill ph-pause text-sm';
    clockIcon.classList.add('animate-pulse');
    timeDisplay.classList.remove('text-slate-500');
    timeDisplay.classList.add('text-cyan-400');
    btnToggle.className = 'flex items-center gap-1.5 px-4 py-2 rounded-lg border text-xs font-mono tracking-widest uppercase transition-all shadow-sm active:scale-95 bg-orange-500/10 border-orange-500/50 text-orange-400';
  }
});

document.getElementById('btn-reset-timer').addEventListener('click', () => {
  clearInterval(AppState.timerInterval);
  AppState.isTimerRunning = false;
  AppState.timeElapsed = 0;
  document.getElementById('timer-display').innerText = '00:00';
  document.getElementById('timer-state-text').innerText = 'START';
  document.getElementById('timer-state-icon').className = 'ph-fill ph-play text-sm';
  document.getElementById('clock-icon').classList.remove('animate-pulse');
  document.getElementById('timer-display').classList.remove('text-cyan-400');
  document.getElementById('timer-display').classList.add('text-slate-500');
  document.getElementById('btn-toggle-timer').className = 'flex items-center gap-1.5 px-4 py-2 rounded-lg border text-xs font-mono tracking-widest uppercase transition-all shadow-sm active:scale-95 bg-green-500/10 border-green-500/50 text-green-400';
  showToast('⏱️ 计时器归零。');
});

function formatTime(secs) {
  const m = Math.floor(secs / 60).toString().padStart(2, '0');
  const s = (secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// -------------------- 电脑发音与麦克风引擎 --------------------
window.playAudio = function(text, event) {
  if (event) { event.stopPropagation(); event.preventDefault(); }
  if (!AppState.synth) { showToast("⚠️ 浏览器不支持语音"); return; }
  
  if (AppState.isListening && AppState.recognition) {
    try { AppState.recognition.abort(); } catch(e){}
    AppState.isListening = false;
    updateMicUI(false);
  }
  
  AppState.synth.cancel();
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.65;
  
  const voices = AppState.synth.getVoices();
  const enVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en-'));
  if (enVoice) utterance.voice = enVoice;
  
  const volIcon = event ? event.currentTarget.querySelector('.ph-speaker-high') : null;
  if(volIcon) volIcon.classList.add('animate-pulse', 'text-cyan-400');
  
  utterance.onend = () => { if(volIcon) volIcon.classList.remove('animate-pulse', 'text-cyan-400'); };
  utterance.onerror = () => { if(volIcon) volIcon.classList.remove('animate-pulse', 'text-cyan-400'); };
  
  AppState.synth.speak(utterance);
};


window.startRecognition = function(targetText, event) {
  if (event) { event.stopPropagation(); event.preventDefault(); }
  if (!AppState.recognition) { showToast("⚠️ 当前环境不支持麦克风"); return; }

  // 防抖与开关逻辑
  if (AppState.isListening) {
      try { AppState.recognition.abort(); } catch (e) {}
      updateMicUI(false);
      return; 
  }

  AppState.synth.cancel();
  updateMicUI(true);
  
  try {
    AppState.recognition.start();
  } catch(e) {
    updateMicUI(false);
    showToast("⚠️ 麦克风正在重置，请稍后再试");
    return;
  }

  AppState.recognition.onresult = (e) => {
    updateMicUI(false);
    const transcript = e.results[0][0].transcript.toLowerCase();
    
    // 提取纯净的单词数组用于匹配
    const targetWords = targetText.toLowerCase().replace(/[^a-z\s]/g, "").split(' ').filter(w=>w);
    const spokenWords = transcript.replace(/[^a-z\s]/g, "").split(' ').filter(w=>w);
    
    // 【核心修复：提高灵敏度和容错率】
    // 只要读出的词命中目标句子的 50% 以上，就算过关
    let matchCount = 0;
    targetWords.forEach(w => {
       if (spokenWords.includes(w)) matchCount++;
    });
    
    const accuracy = matchCount / targetWords.length;
    const targetStr = targetText.toLowerCase().replace(/[^a-z\s]/g, "");
    const spokenStr = transcript.replace(/[^a-z\s]/g, "");

    // 容错判断：命中率>50%，或者包含了整句，或者被包含
    if (accuracy >= 0.5 || targetStr.includes(spokenStr) || spokenStr.includes(targetStr)) {
      showToast('🌟 完美发音！肌肉记忆已刻印');
      document.getElementById('card-container').classList.add('border-green-500', 'shadow-[0_0_50px_rgba(34,197,94,0.4)]');
      setTimeout(() => handleSwipe('right'), 1000); // 延迟自动滑走，让你看清绿光
    } else {
      showToast(`❌ 听到: "${transcript}"。再试一次！`);
      document.getElementById('card-container').classList.add('border-red-500', 'shadow-[0_0_50px_rgba(239,68,68,0.4)]');
      setTimeout(() => {
          document.getElementById('card-container').classList.remove('border-red-500', 'shadow-[0_0_50px_rgba(239,68,68,0.4)]');
      }, 1000);
    }
  };

  AppState.recognition.onerror = (e) => {
    updateMicUI(false);
    if(e.error === 'not-allowed') showToast("⚠️ 请在手机设置中允许 Safari/微信使用麦克风");
    else if (e.error !== 'no-speech') showToast("⚠️ 没听清，请大声点");
  };

  AppState.recognition.onend = () => { updateMicUI(false); }
};

// 极高对比度的麦克风 UI 更新
function updateMicUI(isListening) {
  AppState.isListening = isListening;
  const micBtn = document.getElementById('mic-btn');
  const micText = document.getElementById('mic-text');
  const micOverlay = document.getElementById('mic-overlay');
  
  if (!micBtn) return;
  
  if (isListening) {
    micBtn.classList.add('mic-active');
    micText.innerHTML = '<span class="text-red-400 font-bold text-[11px]">🔴 正在聆听... 请大声朗读</span>';
    if(micOverlay) micOverlay.classList.remove('hidden');
  } else {
    micBtn.classList.remove('mic-active');
    micBtn.className = 'w-16 h-16 rounded-full flex items-center justify-center transition-all bg-slate-800 border-2 border-slate-600 shadow-xl text-slate-400 active:scale-95 z-20 relative';
    micText.innerHTML = 'TAP TO SPEAK';
    if(micOverlay) micOverlay.classList.add('hidden');
  }
}

// -------------------- 业务渲染引擎 --------------------
function loadDailyPlan(tab) {
  if (!DB) return;
  const day = new Date().getDay();
  let dbNode = tab === 'dev' ? DB.dev : DB.survival;
  let pool = [];
  
  // 收集所有可用的 group 组合周末大考
  let allGroups = [];
  for (let key in dbNode) {
     if (Array.isArray(dbNode[key])) allGroups = allGroups.concat(dbNode[key]);
  }

  if(day === 1 || day === 2) { 
    pool = dbNode.group1 || allGroups.slice(0, 10); 
    AppState.deckTitle = tab==='dev'?'代码一阶':'生存一阶'; 
  } else if(day === 3 || day === 4) { 
    pool = dbNode.group2 || dbNode.group1 || allGroups.slice(10, 20); 
    AppState.deckTitle = tab==='dev'?'代码二阶':'生存二阶'; 
  } else if(day === 5 || day === 6) { 
    pool = dbNode.group3 || dbNode.group1 || allGroups.slice(20, 30); 
    AppState.deckTitle = tab==='dev'?'代码三阶':'生存三阶'; 
  } else { 
    pool = allGroups; 
    AppState.deckTitle = `周末总测验: ${pool.length}句`; 
  }
  
  AppState.activeDeck = [...pool].sort(() => Math.random() - 0.5);
  AppState.totalCards = AppState.activeDeck.length;
  AppState.learnedCards = 0;
  if (tab === 'stage1') AppState.todayWords = pool; 
}

window.switchTab = function(tabName) {
  if (!DB) return; 
  AppState.currentTab = tabName;
  
  ['stage1', 'stage2', 'stage3', 'dev'].forEach(id => {
    const el = document.getElementById('nav-'+id);
    if(id === tabName) {
      let colorClass = id==='stage1'?'text-cyan-400':(id==='stage2'?'text-purple-400':(id==='stage3'?'text-emerald-400':'text-green-400'));
      el.className = `nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all ${colorClass}`;
      el.querySelector('i').classList.add('animate-pulse');
    } else {
      el.className = `nav-btn flex-1 flex flex-col items-center justify-center h-full transition-all text-slate-500`;
      el.querySelector('i').classList.remove('animate-pulse');
    }
  });

  if(tabName === 'stage1' || tabName === 'dev') {
    loadDailyPlan(tabName);
    renderSwipeView();
  } else if (tabName === 'stage2') {
    renderStage2View();
  } else if (tabName === 'stage3') {
    renderStage3View();
  }
};

function renderSwipeView() {
  const container = document.getElementById('main-content');
  if (AppState.activeDeck.length === 0) {
    container.innerHTML = `
      <div class="flex flex-col items-center justify-center w-full h-full px-6 text-center animate-in fade-in zoom-in duration-300 flex-1">
        <div class="w-28 h-28 rounded-full bg-green-500/20 border-4 border-green-500 flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(34,197,94,0.4)]">
          <i class="ph ph-check-circle text-6xl text-green-400"></i>
        </div>
        <h2 class="text-3xl font-black text-white mb-3 tracking-widest drop-shadow-md">神经回路建立</h2>
        <p class="text-slate-400 text-base font-mono mb-10">掌握进度: ${AppState.totalCards} / ${AppState.totalCards}</p>
        <div class="text-sm text-slate-400 bg-slate-800/80 p-5 rounded-2xl border border-slate-700 shadow-inner">请前往下方菜单进行下一步实战。</div>
      </div>
    `;
    return;
  }

  const card = AppState.activeDeck[0];
  const percent = AppState.totalCards > 0 ? (AppState.learnedCards / AppState.totalCards) * 100 : 0;
  
  const wordsHtml = card.words && card.words.length > 0 ? card.words.map(w => `
    <button onclick="playAudio('${w.w.replace(/'/g, "\\'")}', event)" class="flex flex-col items-center justify-center bg-[#0a0f1c] hover:bg-slate-800 px-3 py-2 rounded-xl shadow-md border border-slate-700 transition-transform active:scale-90">
      <span class="text-[14px] font-bold text-purple-300 font-mono tracking-wider">${w.w}</span>
      <span class="text-[10px] text-slate-500 mt-1">${w.m}</span>
    </button>
  `).join('') : '';

  container.innerHTML = `
    <div class="flex flex-col items-center w-full h-full px-4 pt-2 pb-6 relative overflow-hidden flex-1">
      
      <!-- 进度指示器 -->
      <div class="w-full mb-3 text-center z-10">
        <h2 class="text-[13px] font-black text-cyan-400 bg-slate-900/80 inline-block px-5 py-2 rounded-full border border-cyan-500/30 shadow-lg tracking-widest">${AppState.deckTitle}</h2>
        <div class="w-full max-w-[280px] h-2 bg-slate-800 rounded-full mx-auto mt-4 overflow-hidden shadow-inner">
          <div class="h-full bg-gradient-to-r from-cyan-600 to-cyan-400 transition-all duration-300 rounded-full" style="width: ${percent}%"></div>
        </div>
        <p class="text-[10px] text-slate-500 font-mono mt-2 tracking-widest uppercase">已掌握: ${AppState.learnedCards} / 剩余: ${AppState.activeDeck.length}</p>
      </div>

      <!-- 主卡片区 -->
      <div class="relative w-full max-w-sm flex-1 flex items-center justify-center perspective-1000 mt-2 mb-4">
        ${AppState.activeDeck.length > 1 ? '<div class="absolute w-full h-[88%] bg-slate-800/80 rounded-[32px] border border-slate-700/50 transform scale-[0.93] translate-y-6 z-0 shadow-lg"></div>' : ''}
        
        <div id="card-container" class="absolute w-full h-[95%] max-h-[580px] bg-[#0f172a] rounded-[32px] border-2 border-slate-700 shadow-2xl flex flex-col items-center justify-between p-6 z-10 card-transition" onclick="playAudio('${card.en.replace(/'/g, "\\'")}', event)">
          
          <!-- 录音提示遮罩 (默认隐藏) -->
          <div id="mic-overlay" class="absolute inset-0 bg-black/60 rounded-[30px] z-10 hidden pointer-events-none backdrop-blur-sm transition-all"></div>

          <!-- 卡片顶部 -->
          <div class="w-full flex justify-between items-center text-slate-500 mb-2 z-20">
            <span class="text-[11px] font-mono tracking-widest bg-slate-800/80 px-3 py-1.5 rounded-lg border border-slate-700 shadow-inner">ID: #${card.id}</span>
            <button class="p-2.5 rounded-full bg-slate-800 shadow-md border border-slate-700"><i class="ph ph-speaker-high text-2xl"></i></button>
          </div>

          <!-- 内容主体 -->
          <div class="flex-1 flex flex-col items-center justify-center w-full text-center py-2 z-20 space-y-5">
            <h2 class="text-4xl sm:text-5xl font-black text-white tracking-tight leading-tight drop-shadow-lg px-2">${card.en}</h2>
            
            <div class="bg-slate-900/90 px-5 py-3 rounded-2xl border border-cyan-500/30 w-[95%] shadow-inner">
              <p class="text-[10px] text-cyan-600 font-mono uppercase tracking-widest mb-1.5">发音密码</p>
              <p class="text-xl font-bold text-cyan-400 tracking-widest">${card.sound}</p>
            </div>
            
            <div class="w-[100%] bg-slate-800/40 rounded-2xl p-3 border border-slate-700/50 flex flex-wrap justify-center gap-2.5" onclick="event.stopPropagation()">
              ${wordsHtml}
            </div>

            <div class="w-full pt-2">
              <p class="text-[10px] text-slate-500 mb-1.5 tracking-widest uppercase">整句意境</p>
              <p class="text-2xl font-bold text-slate-200 tracking-wide">${card.zh}</p>
            </div>
          </div>

          <!-- 高对比度麦克风 -->
          <div class="w-full mt-4 flex flex-col items-center relative z-20">
            <button id="mic-btn" onclick="startRecognition('${card.en.replace(/'/g, "\\'")}', event)" class="w-16 h-16 rounded-full flex items-center justify-center transition-all bg-slate-800 border-2 border-slate-600 shadow-xl text-slate-400 active:scale-95 z-20 relative">
              <i class="ph-fill ph-microphone text-3xl"></i>
            </button>
            <p id="mic-text" class="text-[10px] font-mono mt-3 tracking-widest text-slate-500 uppercase font-bold">TAP TO SPEAK</p>
          </div>
        </div>
      </div>

      <!-- 底部判卷器 (放大触控区) -->
      <div class="w-full max-w-sm flex justify-between items-center z-20 px-2">
        <button onclick="window.handleSwipe('left')" class="w-16 h-16 rounded-full bg-slate-900 border-2 border-red-500/60 flex flex-col items-center justify-center text-red-400 active:scale-90 transition-transform shadow-[0_0_20px_rgba(239,68,68,0.15)]">
          <i class="ph ph-arrow-left text-2xl mb-0.5"></i><span class="text-[9px] font-bold tracking-widest">没记住</span>
        </button>
        <div class="flex flex-col items-center text-slate-600 font-mono text-[10px] uppercase tracking-widest opacity-60">
          <i class="ph ph-arrows-clockwise text-base mb-1"></i> Review
        </div>
        <button onclick="window.handleSwipe('right')" class="w-16 h-16 rounded-full bg-slate-900 border-2 border-green-500/60 flex flex-col items-center justify-center text-green-400 active:scale-90 transition-transform shadow-[0_0_20px_rgba(34,197,94,0.15)]">
          <i class="ph ph-arrow-right text-2xl mb-0.5"></i><span class="text-[9px] font-bold tracking-widest">已掌握</span>
        </button>
      </div>
    </div>
  `;
}

window.handleSwipe = function(direction) {
  if (AppState.activeDeck.length === 0) return;
  const cardEl = document.getElementById('card-container');
  if(!cardEl) return;

  cardEl.classList.add(direction === 'left' ? 'swipe-left' : 'swipe-right');
  const currentCard = AppState.activeDeck[0];

  setTimeout(() => {
    AppState.activeDeck.shift();
    if (direction === 'left') {
      const insertIndex = Math.max(1, Math.floor(AppState.activeDeck.length / 2));
      AppState.activeDeck.splice(insertIndex, 0, currentCard);
    } else {
      AppState.learnedCards++;
    }
    
    if (AppState.isListening) {
        try { AppState.recognition.abort(); } catch(e){}
        AppState.isListening = false;
    }
    renderSwipeView();
  }, 300);
};

function renderStage2View() {
  const container = document.getElementById('main-content');
  if(AppState.todayWords.length === 0) {
    container.innerHTML = `<div class="p-10 text-center text-slate-500 text-sm mt-20 w-full">请先在「一阶生存」获取今日核心词汇。</div>`;
    return;
  }

  let logsHtml = '';
  CONTEXT_TEMPLATES.forEach((tmpl, i) => {
    const word = AppState.todayWords[i % AppState.todayWords.length];
    if(!word) return;
    const en = tmpl.template.replace(/\[TARGET_\d+\]/, word.en.replace('.',''));
    const zh = tmpl.zh.replace(/\[目标词块\d+\]/, word.zh.replace('。',''));
    
    logsHtml += `
      <div class="w-full rounded-xl border font-mono text-sm bg-[#0f172a] border-slate-800 mb-4 overflow-hidden shadow-lg">
        <div class="p-5 flex gap-3 items-start border-b border-slate-800/60">
          <p class="text-slate-300 leading-relaxed whitespace-pre-wrap text-base">${en}</p>
        </div>
        <div class="px-5 pb-5 pt-4 bg-slate-900/50">
          <p class="text-slate-300 text-sm leading-relaxed mb-4 font-sans whitespace-pre-wrap">${zh}</p>
          <button onclick="playAudio('${en.replace(/'/g, "\\'")}', event)" class="w-full text-xs flex items-center justify-center gap-2 text-purple-400 bg-purple-500/10 active:bg-purple-500/20 py-3 rounded-lg border border-purple-500/30 transition-colors shadow-sm">
            <i class="ph-fill ph-speaker-high text-base"></i> 原音慢速重放
          </button>
        </div>
      </div>
    `;
  });

  container.innerHTML = `
    <div class="w-full max-w-md mx-auto px-4 py-6 flex-1">
      <div class="mb-5 border-b border-slate-800 pb-3">
        <h2 class="text-2xl font-black text-purple-400 flex items-center gap-2"><i class="ph-fill ph-radio"></i> 二阶强绑定语境</h2>
        <p class="text-[10px] text-slate-500 font-mono mt-1 uppercase tracking-widest">Real Context Decoding</p>
      </div>
      ${logsHtml}
    </div>
  `;
}

function renderStage3View() {
  const container = document.getElementById('main-content');
  let listHtml = AppState.diaries.length === 0 
    ? '<div class="text-center py-10 text-slate-600"><i class="ph ph-terminal text-4xl mb-3 opacity-20"></i><p class="text-xs font-mono tracking-widest">AWAITING INPUT</p></div>'
    : AppState.diaries.map(d => `
        <div class="bg-slate-800/40 border border-slate-700/50 rounded-xl p-5 mb-4 shadow-sm">
          <p class="text-base text-slate-200 font-mono mb-3 leading-relaxed">${d.text}</p>
          <div class="flex items-center justify-between text-xs text-slate-500 font-mono">
            <span>${d.time}</span><span class="text-emerald-400/80 flex items-center gap-1"><i class="ph-fill ph-check-circle"></i> Shifted</span>
          </div>
        </div>
      `).join('');

  container.innerHTML = `
    <div class="w-full max-w-md mx-auto px-4 py-6 flex-1">
      <div class="mb-5 border-b border-slate-800 pb-3">
        <h2 class="text-2xl font-black text-emerald-400 flex items-center gap-2"><i class="ph-fill ph-shield-check"></i> 三阶显化日记</h2>
        <p class="text-[10px] text-slate-500 font-mono mt-1 uppercase tracking-widest">Manifestation Output</p>
      </div>
      <div class="w-full bg-[#0f172a] border border-slate-700 rounded-2xl p-4 mb-6 shadow-xl focus-within:border-emerald-500/50 transition-colors">
        <textarea id="diary-input" placeholder="用今天学的词块造句..." class="w-full h-24 bg-transparent text-slate-200 placeholder-slate-600 focus:outline-none resize-none font-mono text-base"></textarea>
        <div class="flex justify-between items-center mt-2 pt-3 border-t border-slate-800">
          <i class="ph ph-pen-nib text-slate-600"></i>
          <button onclick="window.sendDiary()" class="flex items-center gap-1.5 px-5 py-2.5 rounded-xl text-sm font-bold bg-emerald-600 text-white active:scale-95 shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-transform">
            <i class="ph-fill ph-paper-plane-right"></i> 发射显化
          </button>
        </div>
      </div>
      <div>
        <h3 class="text-xs text-slate-500 font-mono tracking-widest uppercase border-b border-slate-800 pb-2 mb-4">现实锚点</h3>
        ${listHtml}
      </div>
    </div>
  `;
}

window.sendDiary = function() {
  const input = document.getElementById('diary-input').value;
  if(!input.trim()) return;
  const now = new Date();
  AppState.diaries.unshift({
    id: Date.now(),
    text: input,
    time: `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`
  });
  showToast('🌌 你的宇宙能量已锚定！');
  renderStage3View();
};
</script>
</body>
</html>
